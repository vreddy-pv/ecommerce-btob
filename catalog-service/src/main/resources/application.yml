server:
  port: 8082

spring:
  application:
    name: catalog-service
  ai:
    mcp:
      server:
        name: btob-catalog-mcp-server
        version: 1.0.0
        type: SYNC
  cloud:
    compatibility-verifier:
      enabled: false
    discovery:
      enabled: false
    function:
      definition: orderCreatedConsumer;orderCancelledConsumer
    stream:
      bindings:
        inventoryUpdated-out-0:
          destination: catalog-events
          content-type: application/json
        orderCreated-in-0:
          destination: order-events
          group: catalog-service
          content-type: application/json
      rabbit:
        binder:
          addresses: ${RABBITMQ_HOST:localhost}:${RABBITMQ_PORT:5672}

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/catalog_db
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  sql:
    init:
      mode: never

eureka:
  instance:
    prefer-ip-address: true
  client:
    enabled: false
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
  health:
    rabbit:
      enabled: false

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
