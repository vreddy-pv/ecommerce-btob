server:
  port: 8083

spring:
  application:
    name: order-service
  ai:
    mcp:
      server:
        name: btob-order-mcp-server
        version: 1.0.0
        type: SYNC
  cloud:
    compatibility-verifier:
      enabled: false
    discovery:
      enabled: false
    stream:
      bindings:
        orderCreated-out-0:
          destination: order-events
          content-type: application/json
        orderStatusChanged-out-0:
          destination: order-events
          content-type: application/json
        orderCancelled-out-0:
          destination: order-events
          content-type: application/json
      rabbit:
        binder:
          addresses: ${RABBITMQ_HOST:localhost}:${RABBITMQ_PORT:5672}
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5434}/order_db
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  sql:
    init:
      mode: always

eureka:
  instance:
    prefer-ip-address: true
  client:
    enabled: false
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
  health:
    rabbit:
      enabled: false

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
