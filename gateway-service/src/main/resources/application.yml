server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    compatibility-verifier:
      enabled: false
    gateway:
      globalcors:
        cors-configurations:
          '[/api/**]':
            allowedOrigins: "http://localhost:4200"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
              - PATCH
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600
      routes:
        - id: account-service
          uri: http://account-service:8081
          predicates:
            - Path=/api/accounts/**, /api/auth/**
          filters:
            - StripPrefix=0

        - id: catalog-service
          uri: http://catalog-service:8082
          predicates:
            - Path=/api/catalog/**
          filters:
            - StripPrefix=0

        - id: order-service
          uri: http://order-service:8083
          predicates:
            - Path=/api/orders/**
          filters:
            - StripPrefix=0

        - id: chatbot-agents
          uri: http://chatbot-agents:8090
          predicates:
            - Path=/api/chat/**
          filters:
            - StripPrefix=0

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      show-details: always
    gateway:
      enabled: true

logging:
  level:
    org.springframework.cloud.gateway: DEBUG

btob:
  static-resource-location: classpath:/static/
